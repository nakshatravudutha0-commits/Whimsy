<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whimsy — Setup Your Space</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=Sacramento&display=swap" rel="stylesheet">
<style>
  :root {
    --blush:#F9C8D4;--lilac:#D5C4F0;--mint:#C4EDE0;--butter:#FAF0C8;
    --sky:#C4DEFA;--peach:#FAD8C4;--rose:#E8A0B0;--lavender:#B8A0DC;
    --sage:#A0C8B0;--cream:#FFF8F5;--text-dark:#4A3045;
    --text-mid:#7A6080;--text-light:#B0A0B8;--shadow:rgba(180,150,170,0.15);
  }
  * { margin:0;padding:0;box-sizing:border-box; }
  body {
    font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh;
    display:flex;align-items:center;justify-content:center;overflow-x:hidden;
  }
  .bg-blob{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;opacity:0.5;}
  .bg-blob-1{width:400px;height:400px;background:var(--blush);top:-100px;left:-100px;}
  .bg-blob-2{width:350px;height:350px;background:var(--lilac);bottom:-80px;right:-80px;}

  .setup-card {
    background:rgba(255,248,245,0.9);backdrop-filter:blur(24px);
    border-radius:32px;padding:40px 28px;width:100%;max-width:440px;margin:24px;
    border:1.5px solid rgba(249,200,212,0.4);
    box-shadow:0 20px 60px rgba(180,150,170,0.25);position:relative;z-index:10;
    animation:card-in 0.6s cubic-bezier(0.34,1.2,0.64,1);
  }
  @keyframes card-in{from{opacity:0;transform:translateY(30px) scale(0.96)}to{opacity:1;transform:none}}
  .setup-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,var(--blush),var(--lilac),var(--mint));
    border-radius:32px 32px 0 0;
  }

  .logo{font-family:'Sacramento',cursive;font-size:36px;color:var(--rose);text-align:center;display:block;margin-bottom:4px;}
  .setup-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--text-dark);text-align:center;margin-bottom:6px;}
  .setup-title em{color:var(--rose);font-style:italic;}
  .setup-sub{font-size:13px;color:var(--text-light);text-align:center;margin-bottom:28px;line-height:1.6;}

  /* Progress */
  .progress-row{display:flex;align-items:center;gap:8px;margin-bottom:28px;}
  .progress-step{
    flex:1;height:3px;border-radius:4px;
    background:rgba(213,196,240,0.3);
    transition:all 0.4s ease;
  }
  .progress-step.done{background:linear-gradient(90deg,var(--blush),var(--lilac));}
  .progress-step.active{background:var(--lilac);opacity:0.6;}

  /* Avatar picker */
  .avatar-picker{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:8px;}
  .avatar-opt{
    aspect-ratio:1;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:24px;cursor:pointer;border:2.5px solid transparent;
    background:rgba(249,200,212,0.2);transition:all 0.2s;
  }
  .avatar-opt.selected{border-color:var(--rose);background:rgba(249,200,212,0.4);transform:scale(1.1);}
  .avatar-opt:hover:not(.selected){transform:scale(1.05);}

  .form-group{margin-bottom:18px;}
  .form-label{display:block;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:7px;}
  .form-input{
    width:100%;background:rgba(249,200,212,0.1);
    border:1.5px solid rgba(213,196,240,0.4);border-radius:14px;
    padding:13px 16px;font-family:'DM Sans',sans-serif;font-size:14px;
    color:var(--text-dark);transition:all 0.2s;outline:none;
  }
  .form-input:focus{border-color:var(--lilac);background:white;box-shadow:0 0 0 3px rgba(213,196,240,0.2);}
  .form-input::placeholder{color:var(--text-light);}

  .username-row{position:relative;}
  .username-prefix{
    position:absolute;left:14px;top:50%;transform:translateY(-50%);
    font-size:13px;color:var(--text-light);font-weight:500;pointer-events:none;
  }
  .username-row .form-input{padding-left:48px;}
  .username-check{
    position:absolute;right:12px;top:50%;transform:translateY(-50%);
    font-size:14px;transition:all 0.2s;
  }

  .slug-preview{
    font-size:11px;color:var(--lavender);margin-top:6px;padding-left:4px;
    font-weight:500;
  }

  .btn-primary{
    width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
    background:linear-gradient(135deg,var(--rose),var(--lavender));color:white;
    border:none;padding:15px;border-radius:50px;font-family:'DM Sans',sans-serif;
    font-size:14px;font-weight:500;cursor:pointer;
    box-shadow:0 4px 20px rgba(232,160,176,0.4);transition:all 0.3s;
    margin-top:8px;
  }
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(232,160,176,0.5);}
  .btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

  .error-msg{
    background:rgba(249,200,212,0.3);border:1px solid rgba(232,160,176,0.4);
    color:#C06070;font-size:12px;padding:10px 14px;border-radius:12px;
    margin-bottom:16px;display:none;
  }
  .error-msg.show{display:block;}

  .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;display:none;}
  .spinner.show{display:block;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>

<div class="setup-card">
  <span class="logo">whimsy</span>
  <h2 class="setup-title">Create Your <em>Dream Space</em> ✨</h2>
  <p class="setup-sub">Just a few details to make your birthday page uniquely yours</p>

  <div class="progress-row">
    <div class="progress-step active" id="step-1"></div>
    <div class="progress-step" id="step-2"></div>
    <div class="progress-step" id="step-3"></div>
  </div>

  <div id="error-box" class="error-msg"></div>

  <!-- Step 1: Avatar -->
  <div id="panel-1">
    <div class="form-group">
      <label class="form-label">Pick Your Vibe Avatar</label>
      <div class="avatar-picker" id="avatar-picker">
        <div class="avatar-opt selected" data-emoji="🌷" onclick="selectAvatar(this)">🌷</div>
        <div class="avatar-opt" data-emoji="🌸" onclick="selectAvatar(this)">🌸</div>
        <div class="avatar-opt" data-emoji="✨" onclick="selectAvatar(this)">✨</div>
        <div class="avatar-opt" data-emoji="🦋" onclick="selectAvatar(this)">🦋</div>
        <div class="avatar-opt" data-emoji="🌿" onclick="selectAvatar(this)">🌿</div>
        <div class="avatar-opt" data-emoji="🌙" onclick="selectAvatar(this)">🌙</div>
        <div class="avatar-opt" data-emoji="🌺" onclick="selectAvatar(this)">🌺</div>
        <div class="avatar-opt" data-emoji="🍓" onclick="selectAvatar(this)">🍓</div>
        <div class="avatar-opt" data-emoji="🌻" onclick="selectAvatar(this)">🌻</div>
        <div class="avatar-opt" data-emoji="💫" onclick="selectAvatar(this)">💫</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Your Name</label>
      <input class="form-input" type="text" id="name-input" placeholder="What do your friends call you?">
    </div>
    <button class="btn-primary" onclick="goStep(2)">Next ✦</button>
  </div>

  <!-- Step 2: Username + Birthday -->
  <div id="panel-2" style="display:none;">
    <div class="form-group">
      <label class="form-label">Your Unique Username</label>
      <div class="username-row">
        <span class="username-prefix">whimsy/</span>
        <input class="form-input" type="text" id="username-input" placeholder="yourname" oninput="checkUsername(this.value)">
        <span class="username-check" id="username-check"></span>
      </div>
      <div class="slug-preview" id="slug-preview">Your page: whimsy.app/u/yourname</div>
    </div>
    <div class="form-group">
      <label class="form-label">Your Birthday 🎂</label>
      <input class="form-input" type="date" id="birthday-input">
    </div>
    <button class="btn-primary" onclick="goStep(3)">Next ✦</button>
  </div>

  <!-- Step 3: Confirm -->
  <div id="panel-3" style="display:none;">
    <div style="text-align:center;padding:20px 0;">
      <div id="confirm-avatar" style="font-size:64px;margin-bottom:12px;animation:bob 2s ease-in-out infinite;">🌷</div>
      <div id="confirm-name" style="font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--text-dark);margin-bottom:8px;"></div>
      <div id="confirm-url" style="font-size:13px;color:var(--lavender);font-weight:500;margin-bottom:8px;"></div>
      <div id="confirm-bday" style="font-size:13px;color:var(--text-light);"></div>
    </div>
    <button class="btn-primary" id="btn-save" onclick="saveProfile()">
      <div class="spinner" id="spinner-save"></div>
      <span id="btn-save-text">Launch My Whimsy Space 🌸</span>
    </button>
  </div>
</div>

<style>
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
</style>

<script type="module">
  import { auth } from './firebase-config.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { db } from './firebase-config.js';
  import { doc, setDoc, getDoc, collection, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  let currentUser = null;
  let selectedAvatar = '🌷';
  let usernameValid = false;
  let usernameCheckTimer;
  let currentStep = 1;

  onAuthStateChanged(auth, (user) => {
    if (!user) { window.location.href = 'auth.html'; return; }
    currentUser = user;
    // Pre-fill name if available
    if (user.displayName) document.getElementById('name-input').value = user.displayName;
  });

  window.selectAvatar = (el) => {
    document.querySelectorAll('.avatar-opt').forEach(a => a.classList.remove('selected'));
    el.classList.add('selected');
    selectedAvatar = el.dataset.emoji;
  };

  window.checkUsername = (val) => {
    clearTimeout(usernameCheckTimer);
    const check = document.getElementById('username-check');
    const preview = document.getElementById('slug-preview');
    const clean = val.toLowerCase().replace(/[^a-z0-9_-]/g, '');
    document.getElementById('username-input').value = clean;

    if (!clean || clean.length < 3) {
      check.textContent = '';
      preview.textContent = 'Your page: whimsy.app/u/yourname';
      usernameValid = false;
      return;
    }

    check.textContent = '⏳';
    preview.textContent = `whimsy.app/u/${clean}`;
    usernameCheckTimer = setTimeout(async () => {
      const q = query(collection(db, 'users'), where('username', '==', clean));
      const snap = await getDocs(q);
      if (snap.empty) {
        check.textContent = '✅';
        usernameValid = true;
      } else {
        check.textContent = '❌';
        usernameValid = false;
      }
    }, 500);
  };

  window.goStep = (step) => {
    const errorBox = document.getElementById('error-box');
    errorBox.classList.remove('show');

    if (step === 2) {
      const name = document.getElementById('name-input').value.trim();
      if (!name) { errorBox.textContent = '🌸 Please enter your name'; errorBox.classList.add('show'); return; }
    }
    if (step === 3) {
      const username = document.getElementById('username-input').value.trim();
      if (!username || username.length < 3) { errorBox.textContent = '✦ Username must be at least 3 characters'; errorBox.classList.add('show'); return; }
      if (!usernameValid) { errorBox.textContent = '✦ Please choose a different username'; errorBox.classList.add('show'); return; }
      const bday = document.getElementById('birthday-input').value;
      if (!bday) { errorBox.textContent = '🎂 Please enter your birthday'; errorBox.classList.add('show'); return; }

      // Update confirmation panel
      document.getElementById('confirm-avatar').textContent = selectedAvatar;
      document.getElementById('confirm-name').textContent = document.getElementById('name-input').value.trim() + "'s Whimsy";
      document.getElementById('confirm-url').textContent = `✦ whimsy.app/u/${username}`;
      const bdayDate = new Date(bday + 'T00:00:00');
      document.getElementById('confirm-bday').textContent = `🎂 ${bdayDate.toLocaleDateString('en-US', { month:'long', day:'numeric' })}`;
    }

    document.getElementById(`panel-${currentStep}`).style.display = 'none';
    document.getElementById(`panel-${step}`).style.display = 'block';

    // Update progress
    for (let i = 1; i <= 3; i++) {
      const el = document.getElementById(`step-${i}`);
      el.className = 'progress-step' + (i < step ? ' done' : i === step ? ' active' : '');
    }
    currentStep = step;
  };

  window.saveProfile = async () => {
    const btn = document.getElementById('btn-save');
    const spinner = document.getElementById('spinner-save');
    const btnText = document.getElementById('btn-save-text');
    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.style.opacity = '0';

    try {
      const username = document.getElementById('username-input').value.trim().toLowerCase();
      const name = document.getElementById('name-input').value.trim();
      const birthday = document.getElementById('birthday-input').value;

      await setDoc(doc(db, 'users', currentUser.uid), {
        id: currentUser.uid,
        name,
        username,
        birthday,
        avatar: selectedAvatar,
        email: currentUser.email,
        vibeType: null,
        theme: 'soft-girl',
        accentColor: '#E8A0B0',
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      }, { merge: true });

      window.location.href = 'app.html';
    } catch(e) {
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.style.opacity = '1';
      const errorBox = document.getElementById('error-box');
      errorBox.textContent = '✦ Something went wrong. Please try again.';
      errorBox.classList.add('show');
    }
  };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whimsy — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=Sacramento&display=swap" rel="stylesheet">
<style>
  :root {
    --blush: #F9C8D4; --lilac: #D5C4F0; --mint: #C4EDE0; --butter: #FAF0C8;
    --sky: #C4DEFA; --peach: #FAD8C4; --rose: #E8A0B0; --lavender: #B8A0DC;
    --sage: #A0C8B0; --cream: #FFF8F5; --text-dark: #4A3045;
    --text-mid: #7A6080; --text-light: #B0A0B8; --shadow: rgba(180,150,170,0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .bg-blob { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; opacity: 0.5; }
  .bg-blob-1 { width: 400px; height: 400px; background: var(--blush); top: -100px; left: -100px; }
  .bg-blob-2 { width: 350px; height: 350px; background: var(--lilac); bottom: -80px; right: -80px; }
  .bg-blob-3 { width: 250px; height: 250px; background: var(--mint); bottom: 20%; left: -60px; }

  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .particle {
    position: absolute; border-radius: 50%; opacity: 0.4;
    animation: float linear infinite;
  }
  @keyframes float {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.4; } 90% { opacity: 0.4; }
    100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
  }

  .auth-card {
    background: rgba(255, 248, 245, 0.85);
    backdrop-filter: blur(24px);
    border-radius: 32px;
    padding: 40px 32px;
    width: 100%;
    max-width: 420px;
    margin: 20px;
    border: 1.5px solid rgba(249,200,212,0.4);
    box-shadow: 0 20px 60px rgba(180,150,170,0.25);
    position: relative;
    z-index: 10;
    animation: card-in 0.6s cubic-bezier(0.34,1.2,0.64,1);
  }
  @keyframes card-in { from { opacity: 0; transform: translateY(30px) scale(0.96); } to { opacity: 1; transform: none; } }

  .auth-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--blush), var(--lilac), var(--mint));
    border-radius: 32px 32px 0 0;
  }

  .logo {
    font-family: 'Sacramento', cursive;
    font-size: 42px;
    color: var(--rose);
    text-align: center;
    margin-bottom: 6px;
    display: block;
  }
  .tagline {
    text-align: center;
    font-size: 12px;
    color: var(--text-light);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .tab-row {
    display: flex;
    background: rgba(249,200,212,0.15);
    border-radius: 16px;
    padding: 4px;
    margin-bottom: 28px;
  }
  .tab-btn {
    flex: 1;
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-mid);
    padding: 10px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.25s;
  }
  .tab-btn.active {
    background: white;
    color: var(--text-dark);
    box-shadow: 0 2px 12px var(--shadow);
  }

  .form-panel { display: none; animation: fade-in 0.3s ease; }
  .form-panel.active { display: block; }
  @keyframes fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 7px;
  }
  .form-input {
    width: 100%;
    background: rgba(249,200,212,0.1);
    border: 1.5px solid rgba(213,196,240,0.4);
    border-radius: 14px;
    padding: 13px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text-dark);
    transition: all 0.2s;
    outline: none;
  }
  .form-input:focus {
    border-color: var(--lilac);
    background: white;
    box-shadow: 0 0 0 3px rgba(213,196,240,0.2);
  }
  .form-input::placeholder { color: var(--text-light); }
  .form-input.error { border-color: #E8A0B0; background: rgba(249,200,212,0.15); }

  .btn-primary {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--rose), var(--lavender));
    color: white;
    border: none;
    padding: 15px 28px;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(232,160,176,0.4);
    transition: all 0.3s ease;
    margin-top: 8px;
    letter-spacing: 0.3px;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(232,160,176,0.5); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    color: var(--text-light);
    font-size: 11px;
    font-weight: 500;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(213,196,240,0.4);
  }

  .btn-google {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: white;
    color: var(--text-mid);
    border: 1.5px solid rgba(213,196,240,0.5);
    padding: 13px 28px;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .btn-google:hover { border-color: var(--lilac); transform: translateY(-1px); box-shadow: 0 4px 16px var(--shadow); }
  .google-icon { width: 18px; height: 18px; }

  .error-msg {
    background: rgba(249,200,212,0.3);
    border: 1px solid rgba(232,160,176,0.4);
    color: #C06070;
    font-size: 12px;
    padding: 10px 14px;
    border-radius: 12px;
    margin-bottom: 16px;
    display: none;
    animation: fade-in 0.2s ease;
  }
  .error-msg.show { display: block; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .spinner.show { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer-text {
    text-align: center;
    font-size: 11px;
    color: var(--text-light);
    margin-top: 20px;
    line-height: 1.6;
  }
  .footer-text a { color: var(--rose); text-decoration: none; font-weight: 500; }
</style>
</head>
<body>
<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>
<div class="bg-blob bg-blob-3"></div>
<div class="particles" id="particles"></div>

<div class="auth-card">
  <span class="logo">whimsy</span>
  <div class="tagline">✦ Your Birthday Dream Space ✦</div>

  <div class="tab-row">
    <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
    <button class="tab-btn" onclick="switchTab('signup')">Create Account</button>
  </div>

  <div id="error-box" class="error-msg"></div>

  <!-- LOGIN -->
  <div class="form-panel active" id="panel-login">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="login-password" placeholder="Your secret password..." autocomplete="current-password">
    </div>
    <button class="btn-primary" id="btn-login" onclick="handleLogin()">
      <div class="spinner" id="spinner-login"></div>
      <span id="btn-login-text">Sign In ✦</span>
    </button>
    <div class="divider">or</div>
    <button class="btn-google" onclick="handleGoogleLogin()">
      <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- SIGNUP -->
  <div class="form-panel" id="panel-signup">
    <div class="form-group">
      <label class="form-label">Your Name</label>
      <input class="form-input" type="text" id="signup-name" placeholder="What do your friends call you?">
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="signup-email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="signup-password" placeholder="Create a magical password..." autocomplete="new-password">
    </div>
    <button class="btn-primary" id="btn-signup" onclick="handleSignup()">
      <div class="spinner" id="spinner-signup"></div>
      <span id="btn-signup-text">Create My Space 🌸</span>
    </button>
    <div class="divider">or</div>
    <button class="btn-google" onclick="handleGoogleLogin()">
      <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <div class="footer-text">
    By continuing, you agree to Whimsy's <a href="#">Terms of Service</a> ✦
    <br>Your birthday dream space is waiting 🌸
  </div>
</div>

<script type="module">
  import { auth } from './src/firebase-config.js';
  import {
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    GoogleAuthProvider,
    signInWithPopup,
    onAuthStateChanged,
    updateProfile
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { db } from './src/firebase-config.js';
  import { doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // Redirect if already logged in
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      if (userDoc.exists() && userDoc.data().username) {
        window.location.href = 'app.html';
      } else {
        window.location.href = 'setup.html';
      }
    }
  });

  function showError(msg) {
    const box = document.getElementById('error-box');
    box.textContent = msg;
    box.classList.add('show');
  }
  function hideError() { document.getElementById('error-box').classList.remove('show'); }

  function setLoading(id, state) {
    document.getElementById('btn-' + id).disabled = state;
    document.getElementById('spinner-' + id).style.display = state ? 'block' : 'none';
    document.getElementById('btn-' + id + '-text').style.opacity = state ? '0' : '1';
  }

  async function createUserProfile(user, name) {
    const userRef = doc(db, 'users', user.uid);
    const snap = await getDoc(userRef);
    if (!snap.exists()) {
      await setDoc(userRef, {
        id: user.uid,
        name: name || user.displayName || 'Birthday Star',
        email: user.email,
        username: null,
        birthday: null,
        vibeType: null,
        theme: 'soft-girl',
        accentColor: '#E8A0B0',
        createdAt: serverTimestamp()
      });
    }
  }

  window.switchTab = (tab) => {
    hideError();
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0 && tab==='login')||(i===1 && tab==='signup')));
    document.getElementById('panel-login').classList.toggle('active', tab==='login');
    document.getElementById('panel-signup').classList.toggle('active', tab==='signup');
  };

  window.handleLogin = async () => {
    hideError();
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-password').value;
    if (!email || !pass) { showError('🌸 Please fill in all fields'); return; }
    setLoading('login', true);
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
      setLoading('login', false);
      const msgs = {
        'auth/invalid-credential': '✦ Wrong email or password',
        'auth/user-not-found': '✦ No account found with this email',
        'auth/wrong-password': '✦ Incorrect password',
        'auth/too-many-requests': '✦ Too many attempts. Try again later'
      };
      showError(msgs[e.code] || '✦ Something went wrong. Please try again');
    }
  };

  window.handleSignup = async () => {
    hideError();
    const name = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const pass = document.getElementById('signup-password').value;
    if (!name || !email || !pass) { showError('🌸 Please fill in all fields'); return; }
    if (pass.length < 6) { showError('✦ Password must be at least 6 characters'); return; }
    setLoading('signup', true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
      await createUserProfile(cred.user, name);
    } catch(e) {
      setLoading('signup', false);
      const msgs = {
        'auth/email-already-in-use': '✦ An account with this email already exists',
        'auth/invalid-email': '✦ Please enter a valid email address',
        'auth/weak-password': '✦ Please choose a stronger password'
      };
      showError(msgs[e.code] || '✦ Something went wrong. Please try again');
    }
  };

  window.handleGoogleLogin = async () => {
    hideError();
    try {
      const provider = new GoogleAuthProvider();
      const cred = await signInWithPopup(auth, provider);
      await createUserProfile(cred.user, cred.user.displayName);
    } catch(e) {
      if (e.code !== 'auth/popup-closed-by-user') {
        showError('✦ Google sign-in failed. Please try again');
      }
    }
  };

  // Particles
  const colors = ['#F9C8D4','#D5C4F0','#C4EDE0','#FAF0C8','#C4DEFA'];
  const container = document.getElementById('particles');
  for (let i = 0; i < 14; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 4 + Math.random() * 10;
    p.style.cssText = `width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*5)]};left:${Math.random()*100}%;animation-duration:${8+Math.random()*12}s;animation-delay:${-Math.random()*20}s;`;
    container.appendChild(p);
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const activePanel = document.querySelector('.form-panel.active').id;
      if (activePanel === 'panel-login') window.handleLogin();
      else window.handleSignup();
    }
  });
</script>
</body>
</html>
